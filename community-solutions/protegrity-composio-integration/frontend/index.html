<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protegrity x Composio — Live Demo</title>
  <script src="/static/tailwind.min.js"></script>
  <script src="/static/react.production.min.js"></script>
  <script src="/static/react-dom.production.min.js"></script>
  <script src="/static/babel.min.js"></script>
  <style>
    body { background:#030712; }
    .token-highlight { background:rgba(251,146,60,0.15); border:1px solid rgba(251,146,60,0.4); border-radius:3px; padding:0 2px; }
  </style>
</head>
<body class="text-white min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── helpers ───────────────────────────────────────────────────── */
async function api(path, opts = {}) {
  const r = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const d = await r.json().catch(() => ({ detail: r.statusText }));
  if (!r.ok) throw new Error(d.detail || JSON.stringify(d));
  return d;
}

/* ── small components ──────────────────────────────────────────── */
function Badge({ ok, label }) {
  const cls = ok === undefined
    ? 'bg-gray-800 text-gray-500'
    : ok ? 'bg-green-900/60 text-green-300' : 'bg-gray-800 text-gray-400';
  return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${cls}`}>{ok ? '● ' : '○ '}{label}</span>;
}

function Card({ title, icon, children, dimmed }) {
  return (
    <div className={`rounded-xl border p-5 transition-opacity ${dimmed ? 'border-gray-800 opacity-60' : 'border-gray-700 bg-gray-900/60'}`}>
      <h2 className="text-sm font-semibold mb-4 flex items-center gap-2 text-gray-200">
        <span className="text-base">{icon}</span> {title}
      </h2>
      {children}
    </div>
  );
}

function Input({ label, ...props }) {
  return (
    <div className="flex-1 min-w-52">
      {label && <label className="block text-xs text-gray-400 mb-1">{label}</label>}
      <input
        className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none placeholder-gray-600"
        {...props}
      />
    </div>
  );
}

function Btn({ children, variant = 'primary', ...props }) {
  const base = 'px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-40 transition-colors';
  const variants = {
    primary: 'bg-indigo-600 hover:bg-indigo-500 text-white',
    green:   'bg-green-700 hover:bg-green-600 text-white',
    violet:  'bg-violet-600 hover:bg-violet-500 text-white',
    red:     'bg-red-800 hover:bg-red-700 text-gray-200',
    ghost:   'text-gray-400 hover:text-red-400 underline text-xs bg-transparent',
  };
  return <button className={`${base} ${variants[variant]}`} {...props}>{children}</button>;
}

/* ── redirect URI helper components ───────────────────────────── */
function RedirectUriBox({ uri }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    navigator.clipboard.writeText(uri).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }
  return (
    <div className="bg-amber-950/40 border border-amber-700/50 rounded-lg px-3 py-2 space-y-1">
      <p className="text-amber-300 text-xs font-semibold">⚠ redirect_uri_mismatch — add this exact URI to Google Cloud Console:</p>
      <div className="flex items-center gap-2">
        <code className="text-orange-200 text-xs flex-1 select-all break-all">{uri}</code>
        <button onClick={copy}
          className="shrink-0 text-xs bg-amber-800 hover:bg-amber-700 text-white px-2 py-1 rounded">
          {copied ? '✓ Copied' : 'Copy'}
        </button>
      </div>
      <p className="text-gray-400 text-xs">
        Go to{' '}
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer"
           className="text-indigo-400 underline">Google Cloud Console</a>
        {' '}→ your OAuth2 Client → Authorized redirect URIs → add the URI above → Save → try again.
      </p>
    </div>
  );
}

function DetectUriHint({ detectedUri }) {
  const [copied, setCopied] = useState(false);
  const uri = detectedUri || window.location.origin + '/api/google/callback';
  function copy() {
    navigator.clipboard.writeText(uri).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }
  return (
    <div className="bg-gray-800/60 border border-gray-700 rounded-lg px-3 py-2 space-y-1">
      <p className="text-gray-300 text-xs font-semibold">Required redirect URI — add this to your Google OAuth2 client:</p>
      <div className="flex items-center gap-2">
        <code className="text-orange-200 text-xs flex-1 select-all break-all">{uri}</code>
        <button onClick={copy}
          className="shrink-0 text-xs bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded">
          {copied ? '✓ Copied' : 'Copy'}
        </button>
      </div>
      <p className="text-gray-500 text-xs">
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer"
           className="text-indigo-400 underline">Google Cloud Console</a>
        {' '}→ your OAuth2 Client → Authorized redirect URIs → add the URI above → Save. Also enable Drive API + Sheets API.
      </p>
    </div>
  );
}

/* ── issues table ──────────────────────────────────────────────── */
function IssuesTable({ issues }) {
  if (!issues?.length) return <p className="text-gray-500 text-sm">No issues.</p>;
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-xs">
        <thead>
          <tr className="border-b border-gray-700 text-gray-400">
            {['#','Title','Author','State','Created'].map(h => (
              <th key={h} className="text-left py-2 pr-4 font-medium">{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {issues.map(iss => {
            const login = typeof iss.user === 'object' ? iss.user?.login : iss.user;
            return (
              <tr key={iss.number} className="border-b border-gray-800 hover:bg-gray-800/30">
                <td className="py-2 pr-4 text-gray-500">{iss.number}</td>
                <td className="py-2 pr-4 max-w-xs">
                  <a href={iss.html_url} target="_blank" rel="noreferrer"
                     className="text-indigo-400 hover:underline line-clamp-2">{iss.title}</a>
                </td>
                <td className="py-2 pr-4 text-gray-300">{login}</td>
                <td className="py-2 pr-4">
                  <span className={`px-1.5 py-0.5 rounded text-xs ${iss.state === 'open' ? 'bg-green-900/60 text-green-300' : 'bg-gray-700 text-gray-400'}`}>
                    {iss.state}
                  </span>
                </td>
                <td className="py-2 pr-4 text-gray-400">{(iss.created_at||'').slice(0,10)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── json viewer with PII highlights ──────────────────────────── */
function JsonView({ json, elements }) {
  const entityTypes = elements?.length
    ? [...new Set(elements.map(e => e.type || e.entity_type || e.kind || '?'))]
    : [];
  return (
    <div>
      {entityTypes.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-3">
          <span className="text-xs text-gray-500">PII detected:</span>
          {entityTypes.map((t, i) => (
            <span key={i} className="text-xs bg-orange-900/40 text-orange-300 px-2 py-0.5 rounded">{t}</span>
          ))}
        </div>
      )}
      <pre className="bg-gray-950 border border-gray-800 rounded-lg p-3 text-xs text-gray-300 overflow-auto max-h-80 whitespace-pre-wrap">{json}</pre>
    </div>
  );
}

/* ── pipeline result ───────────────────────────────────────────── */
function PipelineResult({ result, onReset }) {
  const [tab, setTab] = useState('raw');
  const drive = result.stage_4_drive;
  const s1 = result.stage_1_fetch || {};
  const s2 = result.stage_2_protect || {};
  const s3 = result.stage_3_unprotect || {};

  const steps = [
    { label: 'GitHub Fetch',    sub: `${s1.count||0} issues`, ok: true },
    { label: 'Gate 1: Protect', sub: `${result.pii_count||0} PII tokens`, ok: true },
    { label: 'Gate 2: Unprotect', sub: s3.rbac_role ? `role: ${s3.rbac_role}` : '', ok: s3.revealed },
    { label: 'Drive Write',     sub: drive?.ok ? `${drive.rows_written} rows` : (drive?.error||'skipped'), ok: !!drive?.ok },
  ];

  return (
    <div className="rounded-xl border border-indigo-900/60 bg-gray-900/60 p-5 space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-sm font-semibold text-gray-200">✅ Pipeline Complete</h2>
        <Btn variant="ghost" onClick={onReset}>← Run again</Btn>
      </div>

      {/* Flow bar */}
      <div className="flex items-center gap-1 overflow-x-auto pb-1">
        {steps.map((s, i) => (
          <div key={i} className="flex items-center gap-1 shrink-0">
            <div className={`text-center rounded-lg px-3 py-2 border text-xs min-w-28 ${s.ok ? 'border-indigo-700 bg-indigo-950/40' : 'border-amber-700 bg-amber-950/20'}`}>
              <div className="text-gray-400 font-medium">{s.label}</div>
              <div className={`mt-0.5 font-bold ${s.ok ? 'text-indigo-300' : 'text-amber-300'}`}>{s.sub}</div>
            </div>
            {i < 3 && <span className="text-gray-600 text-lg">→</span>}
          </div>
        ))}
      </div>

      {/* Drive banner */}
      {drive?.ok && (
        <div className="flex items-center justify-between bg-green-900/20 border border-green-700/50 rounded-lg px-4 py-3">
          <span className="text-green-300 text-sm">📊 Spreadsheet created with {drive.rows_written} issues</span>
          <a href={drive.url} target="_blank" rel="noreferrer"
             className="bg-green-700 hover:bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium">
            Open in Google Drive →
          </a>
        </div>
      )}
      {drive && !drive.ok && (
        <div className="bg-amber-900/20 border border-amber-700/40 rounded-lg px-4 py-2 text-amber-300 text-sm">
          ⚠ Drive: {drive.error}
        </div>
      )}

      {/* Data tabs */}
      <div>
        <div className="flex gap-1 border-b border-gray-800 mb-3">
          {[['raw','① Raw Issues'],['protected','② Protected JSON'],['unprotected','③ Unprotected JSON']].map(([k,l]) => (
            <button key={k} onClick={() => setTab(k)}
              className={`px-3 py-1.5 text-xs rounded-t transition-colors ${tab===k ? 'bg-indigo-700 text-white' : 'text-gray-500 hover:text-gray-200'}`}>
              {l}
            </button>
          ))}
        </div>
        {tab === 'raw'          && <IssuesTable issues={s1.issues} />}
        {tab === 'protected'    && <JsonView json={s2.protected_json} elements={s2.elements} />}
        {tab === 'unprotected'  && <JsonView json={s3.unprotected_json} />}
      </div>
    </div>
  );
}

/* ── main app ──────────────────────────────────────────────────── */
function App() {
  const [mode, setMode] = useState('demo'); // 'demo' | 'gmail' | 'slack' | 'drive'
  const [repo, setRepo]             = useState('');
  const [ghToken, setGhToken]       = useState('');
  const [clientId, setClientId]     = useState('');
  const [clientSecret, setClientSecret] = useState('');
  const [repoStatus, setRepoStatus] = useState(null);
  const [driveConnected, setDriveConnected] = useState(false);
  const [credsConfigured, setCredsConfigured] = useState(false);
  const [editingCreds, setEditingCreds] = useState(false);
  const [detectedRedirectUri, setDetectedRedirectUri] = useState('');
  const [redirectUriOverride, setRedirectUriOverride] = useState('');
  const [driveTab, setDriveTab] = useState('oauth'); // 'oauth' | 'sa'
  const [saJson, setSaJson] = useState('');
  const [saStatus, setSaStatus] = useState(null);
  const [running, setRunning]       = useState(false);
  const [result, setResult]         = useState(null);
  const [error, setError]           = useState(null);
  const [health, setHealth]         = useState(null);
  const [slackOk, setSlackOk]       = useState(false);

  useEffect(() => {
    api('/api/google/status').then(d => {
      setDriveConnected(!!d.connected);
      setCredsConfigured(!!d.credentials_configured);
      if (d.redirect_uri) setDetectedRedirectUri(d.redirect_uri);
    }).catch(()=>{});
    api('/api/health').then(setHealth).catch(()=>{});
    // Poll drive status after potential OAuth redirect
    const id = setInterval(() => {
      api('/api/google/status').then(d => {
        setDriveConnected(!!d.connected);
        setCredsConfigured(!!d.credentials_configured);
        if (d.redirect_uri) setDetectedRedirectUri(d.redirect_uri);
      }).catch(()=>{});
    }, 5000);
    return () => clearInterval(id);
  }, []);

  async function testRepo() {
    setRepoStatus({ loading: true });
    try {
      const d = await api('/api/demo/test-github', {
        method: 'POST',
        body: JSON.stringify({ repo, github_token: ghToken || null }),
      });
      setRepoStatus(d);
    } catch (e) {
      setRepoStatus({ ok: false, error: e.message });
    }
  }

  async function connectDrive() {
    try {
      const useForm = editingCreds || !credsConfigured;
      const body = useForm
        ? { client_id: clientId, client_secret: clientSecret,
            redirect_uri: redirectUriOverride.trim() || undefined }
        : { redirect_uri: redirectUriOverride.trim() || undefined };
      const d = await api('/api/google/auth-url', {
        method: 'POST',
        body: JSON.stringify(body),
      });
      if (d.redirect_uri) setDetectedRedirectUri(d.redirect_uri);
      if (d.auth_url) window.open(d.auth_url, '_blank', 'width=600,height=720');
      else alert(d.detail || 'Could not get auth URL');
    } catch (e) { alert(e.message); }
  }

  async function saveServiceAccount() {
    setSaStatus({ loading: true });
    try {
      const d = await api('/api/google/service-account', {
        method: 'POST',
        body: JSON.stringify({ service_account_json: saJson }),
      });
      setSaStatus({ ok: true, email: d.service_account_email, message: d.message });
      setDriveConnected(true);
    } catch (e) {
      setSaStatus({ ok: false, error: e.message });
    }
  }

  async function disconnectDrive() {
    await api('/api/google/disconnect', { method: 'DELETE' }).catch(() => {});
    setDriveConnected(false);
  }

  async function runPipeline() {
    setRunning(true);
    setResult(null);
    setError(null);
    try {
      const d = await api('/api/demo/run', {
        method: 'POST',
        body: JSON.stringify({
          repo,
          github_token: ghToken || null,
          rbac_role: 'admin',
          write_to_drive: driveConnected,
        }),
      });
      setResult(d);
      const gs = await api('/api/google/status').catch(() => ({}));
      setDriveConnected(!!gs.connected);
    } catch (e) {
      setError(e.message);
    } finally {
      setRunning(false);
    }
  }

  if (result) return (
    <div className="min-h-screen bg-gray-950">
      <Header health={health} repoOk={repoStatus?.ok} slackOk={slackOk} mode={mode} setMode={setMode} />
      <main className="max-w-5xl mx-auto p-6">
        <PipelineResult result={result} onReset={() => setResult(null)} />
      </main>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-950">
      <Header health={health} repoOk={repoStatus?.ok} slackOk={slackOk} mode={mode} setMode={setMode} />
      <main className="max-w-5xl mx-auto p-6 space-y-5">
        {mode === 'demo' ? (
          <DemoFlowTab />
        ) : mode === 'gmail' ? (
          <GmailTab />
        ) : mode === 'slack' ? (
          <SlackTab onSuccess={() => setSlackOk(true)} />
        ) : (<>

        {/* Step 1: GitHub */}
        <Card title="Step 1 — GitHub Repository" icon="🐙">
          <div className="flex gap-3 flex-wrap items-end">
            <Input label="Repository (owner/repo)"
              placeholder="e.g. torvalds/linux or facebook/react"
              value={repo}
              onChange={e => { setRepo(e.target.value); setRepoStatus(null); }}
            />
            <Input label="GitHub Token (optional)"
              placeholder="ghp_xxx… (for private repos)"
              type="password" value={ghToken}
              onChange={e => setGhToken(e.target.value)}
            />
            <Btn onClick={testRepo} disabled={!repo || !!repoStatus?.loading}>
              {repoStatus?.loading ? '…' : 'Test Repo'}
            </Btn>
          </div>
          {repoStatus && !repoStatus.loading && (
            <div className={`mt-3 text-sm px-3 py-2 rounded-lg ${repoStatus.ok ? 'bg-green-900/30 text-green-300' : 'bg-red-900/30 text-red-300'}`}>
              {repoStatus.ok
                ? `✓ ${repoStatus.repo} — ${repoStatus.open_issues} open issues${repoStatus.private ? ' (private)' : ''}`
                : `✗ ${repoStatus.error}`}
            </div>
          )}
        </Card>

        {/* Step 2: Google Drive */}
        <Card title="Step 2 — Google Drive" icon="📂">
          {driveConnected ? (
            <div className="flex items-center justify-between">
              <span className="text-green-400 text-sm">✓ Google Drive connected — will create a real spreadsheet</span>
              <Btn variant="ghost" onClick={disconnectDrive}>Disconnect</Btn>
            </div>
          ) : (
            <div className="space-y-4">
              {/* Auth method tabs */}
              <div className="flex gap-1 border-b border-gray-700">
                {[['oauth','🔑 OAuth2 (Sign in with Google)'],['sa','📄 Service Account JSON']].map(([k,l]) => (
                  <button key={k} onClick={() => setDriveTab(k)}
                    className={`px-3 py-1.5 text-xs rounded-t transition-colors ${
                      driveTab===k ? 'bg-indigo-700 text-white' : 'text-gray-500 hover:text-gray-200'
                    }`}>{l}</button>
                ))}
              </div>

              {driveTab === 'oauth' && (
                <div className="space-y-3">
                  {/* Always show the redirect URI box prominently */}
                  <div className="bg-gray-800/70 border border-gray-600 rounded-lg px-3 py-2 space-y-1">
                    <p className="text-gray-200 text-xs font-semibold">Step A — Add this redirect URI to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer" className="text-indigo-400 underline">Google Cloud Console</a>:</p>
                    <RedirectUriBox uri={redirectUriOverride || detectedRedirectUri || (window.location.origin + '/api/google/callback')} />
                    <div className="pt-1">
                      <label className="block text-xs text-gray-500 mb-1">
                        Override redirect URI (if the detected one above is wrong):
                      </label>
                      <input
                        className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs text-orange-200 focus:border-indigo-500 focus:outline-none"
                        placeholder={detectedRedirectUri || 'https://your-tunnel.devtunnels.ms/api/google/callback'}
                        value={redirectUriOverride}
                        onChange={e => setRedirectUriOverride(e.target.value)}
                      />
                    </div>
                  </div>

                  {editingCreds ? (
                    <div className="space-y-3">
                      <div className="flex items-center justify-between">
                        <span className="text-amber-300 text-xs font-medium">⚠ Enter updated credentials</span>
                        <button onClick={() => setEditingCreds(false)} className="text-xs text-gray-500 hover:text-gray-300 underline">← Cancel</button>
                      </div>
                      <div className="flex gap-3 flex-wrap items-end">
                        <Input label="Client ID" placeholder="xxx.apps.googleusercontent.com"
                          value={clientId} onChange={e => setClientId(e.target.value)} />
                        <Input label="Client Secret" placeholder="GOCSPX-…"
                          type="password" value={clientSecret} onChange={e => setClientSecret(e.target.value)} />
                        <Btn variant="green" onClick={connectDrive} disabled={!clientId || !clientSecret}>
                          Step B — Sign in with Google
                        </Btn>
                      </div>
                    </div>
                  ) : credsConfigured ? (
                    <div className="flex items-center gap-3">
                      <Btn variant="green" onClick={connectDrive}>
                        Step B — Sign in with Google
                      </Btn>
                      <button onClick={() => setEditingCreds(true)}
                        className="text-xs text-gray-500 hover:text-indigo-400 underline">
                        Wrong credentials? Change them
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      <p className="text-gray-400 text-xs">
                        Step B — enter OAuth2 Web App credentials from{' '}
                        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer" className="text-indigo-400 underline">Google Cloud Console</a>
                        {' '}(enable Drive API + Sheets API):
                      </p>
                      <div className="flex gap-3 flex-wrap items-end">
                        <Input label="Client ID" placeholder="xxx.apps.googleusercontent.com"
                          value={clientId} onChange={e => setClientId(e.target.value)} />
                        <Input label="Client Secret" placeholder="GOCSPX-…"
                          type="password" value={clientSecret} onChange={e => setClientSecret(e.target.value)} />
                        <Btn variant="green" onClick={connectDrive} disabled={!clientId || !clientSecret}>
                          Sign in with Google
                        </Btn>
                      </div>
                    </div>
                  )}
                  <p className="text-xs text-amber-400/70">⚠ You can skip Drive — the pipeline still runs without writing the spreadsheet.</p>
                </div>
              )}

              {driveTab === 'sa' && (
                <div className="space-y-3">
                  <div className="bg-blue-950/40 border border-blue-700/40 rounded-lg px-3 py-2 text-xs text-blue-300 space-y-1">
                    <p className="font-semibold">📌 No redirect URI needed — works from any environment</p>
                    <ol className="list-decimal list-inside space-y-0.5 text-blue-200/80">
                      <li>Go to <a href="https://console.cloud.google.com/iam-admin/serviceaccounts" target="_blank" rel="noreferrer" className="text-indigo-400 underline">Google Cloud Console → Service Accounts</a></li>
                      <li>Create a service account → skip role assignment → create</li>
                      <li>Click the account → Keys tab → Add Key → JSON → download</li>
                      <li>Enable <strong>Drive API</strong> + <strong>Sheets API</strong> in the project</li>
                      <li>Paste the downloaded JSON below and click Save</li>
                      <li>Optional: share a Drive folder with the service account email to see files in your Drive</li>
                    </ol>
                  </div>
                  <textarea
                    className="w-full h-32 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 font-mono focus:border-indigo-500 focus:outline-none"
                    placeholder='Paste the service account JSON key here...  {"type": "service_account", "project_id": "..."}'
                    value={saJson}
                    onChange={e => setSaJson(e.target.value)}
                  />
                  <div className="flex items-center gap-3">
                    <Btn variant="green" onClick={saveServiceAccount} disabled={!saJson.trim() || saStatus?.loading}>
                      {saStatus?.loading ? 'Saving…' : 'Save Service Account'}
                    </Btn>
                    {saStatus && (
                      <span className={`text-xs ${saStatus.ok ? 'text-green-400' : 'text-red-400'}`}>
                        {saStatus.ok ? `✓ ${saStatus.email}` : `✗ ${saStatus.error}`}
                      </span>
                    )}
                  </div>
                  {saStatus?.ok && (
                    <p className="text-xs text-gray-400">{saStatus.message}</p>
                  )}
                </div>
              )}
            </div>
          )}
        </Card>

        {/* Step 3: Run */}
        <Card title="Step 3 — Run the Pipeline" icon="⚡">
          <div className="space-y-4">
            <div className="text-xs text-gray-400 flex flex-wrap gap-x-6 gap-y-1">
              <span>1. Fetch last 5 GitHub issues from <strong className="text-gray-200">{repo || '&lt;repo&gt;'}</strong></span>
              <span>→</span>

function DemoFlowTab() {

  const [error, setError]       = useState(null);

    setRunning(true); setError(null); setData(null); setProgressStep(0);

        method: 'POST',
        body: JSON.stringify({ run_guardrails: runGuardrails }),
      });
      setData(d);

            <p>Use the <strong>🔒 Protected / 🔓 Plain</strong> toggles on each stage to see what data looks like in transit vs in the clear.</p>
          </div>
          <div className="flex items-center gap-6 flex-wrap">
            <label className="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
              <input type="checkbox" checked={runGuardrails} onChange={e => setRunGuardrails(e.target.checked)}
                className="accent-indigo-500" />
              Run Semantic Guardrails (Protegrity SGR)
            </label>
            <Btn variant="violet" style={{padding:'0.6rem 1.5rem'}} onClick={runDemo} disabled={running}>
              {running
                ? <span className="flex items-center gap-2"><span className="animate-spin inline-block">⚙</span> Running demo…</span>
                : '🚀 Run Full Demo'}
            </Btn>
          </div>
          {running && (
            <div className="bg-gray-800/60 border border-indigo-700/40 rounded-lg px-4 py-2.5 flex items-center gap-3">
              <span className="animate-spin inline-block text-indigo-400 text-base">⚙</span>
              <span className="text-indigo-200 text-xs font-medium">{PROGRESS_STEPS[progressStep]}</span>

function SlackTab({ onSuccess }) {
  const ROLES = [
    { id: 'admin',  label: '🔓 Admin',  desc: 'PII de-tokenised before sending' },
    { id: 'viewer', label: '🔒 Viewer', desc: 'PII stays tokenised' },
  ];

  const [slackToken, setSlackToken]   = useState('');
  const [tokenOk, setTokenOk]         = useState(null);   // null | {ok,team,bot_user} | {ok:false,error}
  const [testing, setTesting]         = useState(false);
  const [repo, setRepo]               = useState('');
  const [ghToken, setGhToken]         = useState('');
  const [recipients, setRecipients]   = useState([
    { identifier: '', role: 'viewer', display_name: '' },
    { identifier: '', role: 'admin',  display_name: '' },
  ]);
  const [dryRun, setDryRun]           = useState(true);
  const [running, setRunning]         = useState(false);
  const [result, setResult]           = useState(null);
  const [error, setError]             = useState(null);

  async function testToken() {
    setTesting(true); setTokenOk(null);
    try {
      const d = await api('/api/slack/test', {
        method: 'POST',
        body: JSON.stringify({ slack_token: slackToken }),
      });
      setTokenOk(d);
    } catch(e) { setTokenOk({ ok: false, error: e.message }); }
    finally { setTesting(false); }
  }

  function updateRecipient(i, field, val) {
    setRecipients(rs => rs.map((r, idx) => idx === i ? { ...r, [field]: val } : r));
  }
  function addRecipient() {
    setRecipients(rs => [...rs, { identifier: '', role: 'viewer', display_name: '' }]);
  }
  function removeRecipient(i) {
    setRecipients(rs => rs.filter((_, idx) => idx !== i));
  }

  async function run() {
    setRunning(true); setResult(null); setError(null);
    const filled = recipients.filter(r => r.identifier.trim());
    if (!filled.length) { setError('Add at least one recipient.'); setRunning(false); return; }
    try {
      const d = await api('/api/slack/run', {
        method: 'POST',
        body: JSON.stringify({
          slack_token: slackToken,
          repo,
          github_token: ghToken || undefined,
          recipients: filled,
          dry_run: dryRun,
        }),
      });
      setResult(d);
      if (d.ok && (d.sent_count > 0 || dryRun) && onSuccess) onSuccess();
    } catch(e) { setError(e.message); }
    finally { setRunning(false); }
  }

  return (
    <div className="space-y-5">

      {/* Step 1 — Slack Bot Token */}
      <Card title="Step 1 — Slack Bot Token" icon="💬">
        <div className="space-y-3">
          <div className="bg-blue-950/40 border border-blue-700/40 rounded-lg px-3 py-2 text-xs text-blue-200 space-y-1">
            <p className="font-semibold">📌 Create a Slack App with a Bot Token</p>
            <ol className="list-decimal list-inside space-y-0.5 text-blue-100/80">
              <li>Go to <a href="https://api.slack.com/apps" target="_blank" rel="noreferrer" className="text-indigo-400 underline">api.slack.com/apps</a> → Create New App → From scratch</li>
              <li>OAuth &amp; Permissions → Bot Token Scopes → add: <code className="text-orange-200">chat:write  im:write  users:read  users:read.email</code></li>
              <li>Install to Workspace → copy the <strong>Bot User OAuth Token</strong> (starts with <code className="text-orange-200">xoxb-</code>)</li>
              <li>Invite the bot to your workspace: <code className="text-orange-200">/invite @YourBotName</code> in any channel</li>
            </ol>
          </div>
          <div className="flex gap-3 items-end flex-wrap">
            <Input label="Bot Token (xoxb-…)" placeholder="xoxb-…"
              type="password" value={slackToken}
              onChange={e => { setSlackToken(e.target.value); setTokenOk(null); }} />
            <Btn onClick={testToken} disabled={!slackToken || testing}>
              {testing ? 'Testing…' : 'Test Token'}
            </Btn>
          </div>
          {tokenOk && (
            <p className={`text-sm ${tokenOk.ok ? 'text-green-400' : 'text-red-400'}`}>
              {tokenOk.ok
                ? `✓ Connected to workspace "${tokenOk.team}" as bot @${tokenOk.bot_user}`
                : `✗ ${tokenOk.error}`}
            </p>
          )}
        </div>
      </Card>

      {/* Step 2 — GitHub repo */}
      <Card title="Step 2 — GitHub Repository" icon="🐙">
        <div className="space-y-2">
          <p className="text-gray-400 text-xs">Fetches the top 5 issues updated in the last 24 h (falls back to most recent if none).</p>
          <div className="flex gap-3 flex-wrap items-end">
            <Input label="Repository (owner/repo)" placeholder="e.g. microsoft/vscode"
              value={repo} onChange={e => setRepo(e.target.value)} />
            <Input label="GitHub Token (optional)" placeholder="ghp_xxx…"
              type="password" value={ghToken} onChange={e => setGhToken(e.target.value)} />
          </div>
        </div>
      </Card>

      {/* Step 3 — Recipients */}
      <Card title="Step 3 — Recipients & RBAC" icon="👥">
        <div className="space-y-3">
          <p className="text-gray-400 text-xs">
            Each recipient gets their own Slack DM.{' '}
            <span className="text-orange-300">Admin</span> recipients see real names/emails (de-tokenised).{' '}
            <span className="text-indigo-300">Viewer</span> recipients see PII replaced with tokens.
          </p>
          <div className="space-y-2">
            {recipients.map((r, i) => (
              <div key={i} className="flex gap-2 items-center flex-wrap bg-gray-800/50 rounded-lg px-3 py-2">
                <div className="flex-1 min-w-40">
                  <label className="block text-xs text-gray-400 mb-1">Slack email / @username / display name</label>
                  <input
                    className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-sm focus:border-indigo-500 focus:outline-none placeholder-gray-600"
                    placeholder="user@company.com  or  @johndoe"
                    value={r.identifier}
                    onChange={e => updateRecipient(i, 'identifier', e.target.value)}
                  />
                </div>
                <div className="min-w-36">
                  <label className="block text-xs text-gray-400 mb-1">Label (optional)</label>
                  <input
                    className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-sm focus:border-indigo-500 focus:outline-none placeholder-gray-600"
                    placeholder="e.g. Alice"
                    value={r.display_name}
                    onChange={e => updateRecipient(i, 'display_name', e.target.value)}
                  />
                </div>
                <div className="min-w-36">
                  <label className="block text-xs text-gray-400 mb-1">Access level</label>
                  <select
                    className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-sm focus:border-indigo-500 focus:outline-none"
                    value={r.role}
                    onChange={e => updateRecipient(i, 'role', e.target.value)}
                  >
                    {ROLES.map(role => (
                      <option key={role.id} value={role.id}>{role.label} — {role.desc}</option>
                    ))}
                  </select>
                </div>
                {recipients.length > 1 && (
                  <button onClick={() => removeRecipient(i)}
                    className="text-gray-500 hover:text-red-400 text-xs mt-4 ml-1">✕</button>
                )}
              </div>
            ))}
          </div>
          <button onClick={addRecipient}
            className="text-xs text-indigo-400 hover:text-indigo-300 underline">
            + Add another recipient
          </button>
        </div>
      </Card>

      {/* Step 4 — Run */}
      <Card title="Step 4 — Send" icon="⚡">
        <div className="space-y-3">
          <div className="text-xs text-gray-400 space-y-0.5">
            <p>1. Fetch top-5 issues from GitHub updated today</p>
            <p>2. <span className="text-orange-300">Protegrity Gate 1</span> — tokenise all PII</p>
            <p>3. Per recipient:</p>
            <p className="pl-4">• <span className="text-green-300">Admin</span> → Gate 2 unprotect → plain text DM</p>
            <p className="pl-4">• <span className="text-indigo-300">Viewer</span> → keep tokenised → protected DM</p>
          </div>
          <label className="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
            <input type="checkbox" checked={dryRun} onChange={e => setDryRun(e.target.checked)}
              className="accent-indigo-500" />
            Preview only (don't actually send Slack messages)
          </label>
          <Btn variant="violet" style={{padding:'0.65rem 1.5rem',fontSize:'0.9rem'}}
            onClick={run} disabled={!tokenOk?.ok || !repo || running}>
            {running
              ? <span className="flex items-center gap-2"><span className="animate-spin inline-block">⚙</span> Running…</span>
              : dryRun ? '🔍 Preview' : '🚀 Send to Slack'}
          </Btn>
          {(!tokenOk?.ok || !repo) && (
            <p className="text-gray-500 text-xs">
              {!tokenOk?.ok ? 'Test your Slack token first.' : 'Enter a GitHub repo above.'}
            </p>
          )}
          {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg px-3 py-2 text-red-300 text-sm">✗ {error}</div>}
        </div>
      </Card>

      {result && <SlackResult result={result} dryRun={dryRun} />}
    </div>
  );
}

function SlackResult({ result, dryRun }) {
  const [showIssues, setShowIssues] = useState(false);
  if (!result.ok) {
    return (
      <div className="bg-red-900/30 border border-red-700/50 rounded-lg px-4 py-3 text-red-300 text-sm">
        ✗ {result.error}
      </div>
    );
  }
  return (
    <div className="rounded-xl border border-indigo-900/60 bg-gray-900/60 p-5 space-y-4">
      <h2 className="text-sm font-semibold text-gray-200">
        {dryRun ? '🔍 Preview' : '✅ Done'} — {result.issues_found} issue(s) from <code className="text-indigo-300">{result.repo}</code>
      </h2>

      {/* PII counter */}
      <div className="flex gap-6 text-xs text-gray-400 flex-wrap">
        <span>Issues fetched: <strong className="text-gray-200">{result.issues_found}</strong></span>
        <span>PII tokens created: <strong className="text-orange-300">{result.pii_count}</strong></span>
        <span>Messages {dryRun ? 'would be sent' : 'sent'}: <strong className="text-green-300">{result.sent_count}</strong></span>
      </div>

      {/* Per-recipient results */}
      <div className="space-y-2">
        {(result.recipients || []).map((r, i) => (
          <div key={i} className={`rounded-lg border px-4 py-3 ${r.error ? 'border-red-700/50 bg-red-900/20' : r.sent ? 'border-green-700/40 bg-green-900/10' : 'border-gray-700 bg-gray-800/30'}`}>
            <div className="flex items-center justify-between gap-4 flex-wrap">
              <div className="flex items-center gap-2">
                {r.sent
                  ? <span className="text-xs bg-green-900/60 text-green-300 px-2 py-0.5 rounded">✓ Sent</span>
                  : r.error
                    ? <span className="text-xs bg-red-900/60 text-red-300 px-2 py-0.5 rounded">✗ Error</span>
                    : <span className="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded">{dryRun ? 'Preview' : 'Skipped'}</span>}
                <span className="text-sm text-gray-200 font-medium">{r.display_name || r.identifier}</span>
                <span className={`text-xs px-2 py-0.5 rounded ${r.role === 'admin' ? 'bg-green-900/40 text-green-300' : 'bg-indigo-900/40 text-indigo-300'}`}>
                  {r.role === 'admin' ? '🔓 Admin — plain text' : '🔒 Viewer — protected'}
                </span>
              </div>
              {r.user_id && <span className="text-gray-500 text-xs font-mono">{r.user_id}</span>}
            </div>
            {r.error && <p className="text-red-300 text-xs mt-1">{r.error}</p>}
          </div>
        ))}
      </div>

      {/* Toggle raw issues */}
      <div>
        <button onClick={() => setShowIssues(v => !v)}
          className="text-xs text-gray-500 hover:text-gray-300 underline">
          {showIssues ? 'Hide' : 'Show'} fetched issues
        </button>
        {showIssues && (
          <pre className="mt-2 bg-gray-950 border border-gray-800 rounded-lg p-3 text-xs text-gray-300 overflow-auto max-h-64 whitespace-pre-wrap">
            {JSON.stringify(result.issues, null, 2)}
          </pre>
        )}
      </div>
    </div>
  );
}

function GmailTab() {
  const [clientId, setClientId]       = useState('');
  const [clientSecret, setClientSecret] = useState('');
  const [defaultRepo, setDefaultRepo] = useState('');
  const [ghToken, setGhToken]         = useState('');
  const [gmailStatus, setGmailStatus] = useState(null); // {connected, email, credentials_configured, redirect_uri}
  const [editingCreds, setEditingCreds] = useState(false);
  const [redirectOverride, setRedirectOverride] = useState('');
  const [running, setRunning]         = useState(false);
  const [dryRun, setDryRun]           = useState(true);
  const [result, setResult]           = useState(null);
  const [error, setError]             = useState(null);

  useEffect(() => {
    api('/api/gmail/status').then(setGmailStatus).catch(() => {});
    const id = setInterval(() => {
      api('/api/gmail/status').then(d => { setGmailStatus(d); }).catch(() => {});
    }, 4000);
    return () => clearInterval(id);
  }, []);

  async function connectGmail() {
    try {
      const useForm = editingCreds || !gmailStatus?.credentials_configured;
      const body = {
        redirect_uri: redirectOverride.trim() || undefined,
        ...(useForm ? { client_id: clientId, client_secret: clientSecret } : {}),
      };
      const d = await api('/api/gmail/auth-url', { method: 'POST', body: JSON.stringify(body) });
      if (d.auth_url) window.open(d.auth_url, '_blank', 'width=600,height=720');
      else alert(d.detail || 'Could not get auth URL');
    } catch(e) { alert(e.message); }
  }

  async function disconnectGmail() {
    await api('/api/gmail/disconnect', { method: 'DELETE' }).catch(() => {});
    setGmailStatus(s => ({ ...s, connected: false, email: null }));
  }

  async function runPipeline() {
    setRunning(true); setResult(null); setError(null);
    const endpoint = dryRun ? '/api/gmail/preview' : '/api/gmail/run';
    try {
      const d = await api(endpoint, {
        method: 'POST',
        body: JSON.stringify({
          default_repo: defaultRepo || undefined,
          github_token: ghToken || undefined,
          dry_run: dryRun,
        }),
      });
      setResult(d);
    } catch(e) { setError(e.message); }
    finally { setRunning(false); }
  }

  const connected = !!gmailStatus?.connected;
  const detectedUri = gmailStatus?.redirect_uri || (window.location.origin + '/api/gmail/callback');

  return (
    <div className="space-y-5">
      {/* Step 1 – Gmail OAuth */}
      <Card title="Step 1 — Connect Gmail (OAuth2)" icon="✉️">
        {connected ? (
          <div className="flex items-center justify-between">
            <span className="text-green-400 text-sm">✓ Gmail connected — {gmailStatus?.email}</span>
            <Btn variant="ghost" onClick={disconnectGmail}>Disconnect</Btn>
          </div>
        ) : (
          <div className="space-y-3">
            {/* Redirect URI box */}
            <div className="bg-gray-800/70 border border-gray-600 rounded-lg px-3 py-2 space-y-2">
              <p className="text-gray-200 text-xs font-semibold">
                Step A — Add this redirect URI to your{' '}
                <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer"
                   className="text-indigo-400 underline">Google Cloud OAuth2 client</a>
                {' '}and enable <strong>Gmail API</strong>:
              </p>
              <RedirectUriBox uri={redirectOverride || detectedUri} />
              <div>
                <label className="block text-xs text-gray-500 mb-1">Override redirect URI (if the detected one above is wrong):</label>
                <input
                  className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs text-orange-200 focus:border-indigo-500 focus:outline-none"
                  placeholder={detectedUri}
                  value={redirectOverride}
                  onChange={e => setRedirectOverride(e.target.value)}
                />
              </div>
            </div>

            {editingCreds ? (
              <div className="space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-amber-300 text-xs font-medium">⚠ Enter updated credentials</span>
                  <button onClick={() => setEditingCreds(false)} className="text-xs text-gray-500 hover:text-gray-300 underline">← Cancel</button>
                </div>
                <div className="flex gap-3 flex-wrap items-end">
                  <Input label="Client ID" placeholder="xxx.apps.googleusercontent.com"
                    value={clientId} onChange={e => setClientId(e.target.value)} />
                  <Input label="Client Secret" placeholder="GOCSPX-…"
                    type="password" value={clientSecret} onChange={e => setClientSecret(e.target.value)} />
                  <Btn variant="green" onClick={connectGmail} disabled={!clientId || !clientSecret}>
                    Step B — Sign in with Google
                  </Btn>
                </div>
              </div>
            ) : gmailStatus?.credentials_configured ? (
              <div className="flex items-center gap-3">
                <Btn variant="green" onClick={connectGmail}>Step B — Sign in with Google (Gmail)</Btn>
                <button onClick={() => setEditingCreds(true)}
                  className="text-xs text-gray-500 hover:text-indigo-400 underline">
                  Wrong credentials? Change them
                </button>
              </div>
            ) : (
              <div className="space-y-2">
                <div className="bg-amber-950/40 border border-amber-700/50 rounded-lg px-3 py-2 text-xs text-amber-200 space-y-1">
                  <p className="font-semibold">⚠ You need YOUR OWN Google Cloud credentials — NOT Composio's</p>
                  <ol className="list-decimal list-inside space-y-0.5 text-amber-100/80">
                    <li>Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer" className="text-indigo-400 underline">Google Cloud Console → APIs &amp; Services → Credentials</a></li>
                    <li>Create a new project (or select an existing one)</li>
                    <li>Click <strong>+ Create Credentials → OAuth client ID → Web application</strong></li>
                    <li>Add the redirect URI shown in Step A above under <strong>Authorized redirect URIs</strong> → Save</li>
                    <li>Copy <strong>Client ID</strong> + <strong>Client Secret</strong> and paste below</li>
                    <li>Enable <strong>Gmail API</strong> in <a href="https://console.cloud.google.com/apis/library" target="_blank" rel="noreferrer" className="text-indigo-400 underline">APIs &amp; Services → Library</a></li>
                    <li>Go to <a href="https://console.cloud.google.com/apis/credentials/consent" target="_blank" rel="noreferrer" className="text-indigo-400 underline">OAuth consent screen</a> → add your email as a <strong>Test user</strong></li>
                  </ol>
                </div>
                <div className="flex gap-3 flex-wrap items-end">
                  <Input label="Client ID" placeholder="xxx.apps.googleusercontent.com"
                    value={clientId} onChange={e => setClientId(e.target.value)} />
                  <Input label="Client Secret" placeholder="GOCSPX-…"
                    type="password" value={clientSecret} onChange={e => setClientSecret(e.target.value)} />
                  <Btn variant="green" onClick={connectGmail} disabled={!clientId || !clientSecret}>
                    Sign in with Google
                  </Btn>
                </div>
              </div>
            )}
          </div>
        )}
      </Card>

      {/* Step 2 – GitHub */}
      <Card title="Step 2 — GitHub Default Repo (fallback)" icon="🐙">
        <div className="space-y-2">
          <p className="text-gray-400 text-xs">Used when an email doesn't mention a repo. If the email says "get issues from microsoft/vscode" this is ignored.</p>
          <div className="flex gap-3 flex-wrap items-end">
            <Input label="Default repo (owner/repo)" placeholder="e.g. microsoft/vscode"
              value={defaultRepo} onChange={e => setDefaultRepo(e.target.value)} />
            <Input label="GitHub Token (optional)" placeholder="ghp_xxx…"
              type="password" value={ghToken} onChange={e => setGhToken(e.target.value)} />
          </div>
        </div>
      </Card>

      {/* Step 3 – Run */}
      <Card title="Step 3 — Run the Agent" icon="⚡">
        <div className="space-y-3">
          <div className="text-xs text-gray-400 space-y-0.5">
            <p>For each unread email in the last 24 h the agent will:</p>
            <p className="pl-3">1. Read the email → parse intent (which GitHub repo / issues)</p>
            <p className="pl-3">2. Fetch data from GitHub</p>
            <p className="pl-3">3. <span className="text-orange-300">Protegrity protect</span> (tokenise PII in transit)</p>
            <p className="pl-3">4. <span className="text-green-300">Protegrity unprotect</span> (RBAC admin) → plain text</p>
            <p className="pl-3">5. Send reply email with issue details</p>
          </div>
          <label className="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
            <input type="checkbox" checked={dryRun} onChange={e => setDryRun(e.target.checked)}
              className="accent-indigo-500" />
            Preview only (don't actually send replies)
          </label>
          <Btn variant="violet" style={{padding:'0.65rem 1.5rem',fontSize:'0.9rem'}}
            onClick={runPipeline} disabled={!connected || running}>
            {running
              ? <span className="flex items-center gap-2"><span className="animate-spin inline-block">⚙</span> Running…</span>
              : dryRun ? '🔍 Preview Emails' : '🚀 Process & Reply'}
          </Btn>
          {!connected && <p className="text-gray-500 text-xs">Connect Gmail above first.</p>}
          {error && <div className="bg-red-900/30 border border-red-700/50 rounded-lg px-3 py-2 text-red-300 text-sm">✗ {error}</div>}
        </div>
      </Card>

      {result && <GmailResults result={result} dryRun={dryRun} />}
    </div>
  );
}

function GmailResults({ result, dryRun }) {
  const [expanded, setExpanded] = useState(null);
  return (
    <div className="rounded-xl border border-indigo-900/60 bg-gray-900/60 p-5 space-y-4">
      <div className="flex items-center gap-4 flex-wrap">
        <h2 className="text-sm font-semibold text-gray-200">
          {dryRun ? '🔍 Preview' : '✅ Done'} — {result.emails_found} email(s) found
        </h2>
        <span className="text-xs text-gray-400">
          {result.replies_sent} repl{result.replies_sent === 1 ? 'y' : 'ies'} {dryRun ? 'would be sent' : 'sent'} · {result.errors} error(s)
        </span>
      </div>
      {result.message && <p className="text-gray-400 text-sm">{result.message}</p>}
      {(result.processed || []).map((item, i) => (
        <div key={i} className="border border-gray-800 rounded-lg overflow-hidden">
          <button
            onClick={() => setExpanded(expanded === i ? null : i)}
            className="w-full text-left px-4 py-3 flex items-start justify-between gap-4 hover:bg-gray-800/40">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                {item.error
                  ? <span className="text-xs bg-red-900/60 text-red-300 px-2 py-0.5 rounded">✗ Error</span>
                  : item.reply_sent
                    ? <span className="text-xs bg-green-900/60 text-green-300 px-2 py-0.5 rounded">✓ Replied</span>
                    : <span className="text-xs bg-indigo-900/60 text-indigo-300 px-2 py-0.5 rounded">{dryRun ? 'Preview' : 'Skipped'}</span>}
                <span className="text-gray-300 text-sm truncate">{item.subject}</span>
              </div>
              <div className="text-gray-500 text-xs mt-0.5">{item.from} · {(item.date||'').slice(0,25)}</div>
              {item.intent && (
                <div className="text-gray-500 text-xs mt-1">
                  Intent: <span className="text-indigo-300">{item.intent.action}</span>
                  {item.intent.issue_numbers?.length > 0 && <> · issues #{item.intent.issue_numbers.join(', #')}</>}
                  {item.repo_used && <> · repo: <span className="text-gray-300">{item.repo_used}</span></>}
                  {item.issues_fetched > 0 && <> · {item.issues_fetched} issues fetched</>}
                  {item.pii_count > 0 && <> · <span className="text-orange-300">{item.pii_count} PII tokens</span></>}
                </div>
              )}
            </div>
            <span className="text-gray-600 text-xs shrink-0">{expanded === i ? '▲' : '▼'}</span>
          </button>
          {expanded === i && (
            <div className="px-4 pb-4 space-y-3 border-t border-gray-800 pt-3">
              {item.error && <p className="text-red-300 text-sm">Error: {item.error}</p>}
              {item.reply_preview && (
                <div>
                  <p className="text-xs text-gray-400 mb-1 font-semibold">{dryRun ? 'Would send:' : 'Sent reply:'}</p>
                  <pre className="bg-gray-950 border border-gray-800 rounded p-3 text-xs text-gray-300 whitespace-pre-wrap max-h-60 overflow-auto">{item.reply_preview}</pre>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function Header({ health, repoOk, slackOk, mode, setMode }) {
  return (
    <header className="bg-gray-900/80 border-b border-gray-800 px-6 py-3 backdrop-blur sticky top-0 z-10">
      <div className="max-w-5xl mx-auto flex items-center justify-between gap-4">
        <div>
          <h1 className="text-base font-bold text-indigo-300">🛡️ Protegrity × Composio</h1>
          <p className="text-gray-500 text-xs">Agentic Secure Data Bridge</p>
        </div>
        {/* Mode tabs */}
        <div className="flex gap-1 bg-gray-800 rounded-lg p-1">
          {[['demo','🎥 Live Demo'],['gmail','✉️ Gmail Agent'],['slack','💬 GitHub → Slack'],['drive','📂 GitHub → Drive']].map(([k,l]) => (
            <button key={k} onClick={() => setMode(k)}
              className={`px-3 py-1 text-xs rounded-md transition-colors font-medium ${mode===k ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-gray-200'}`}>
              {l}
            </button>
          ))}
        </div>
        <div className="flex gap-2 flex-wrap">
          <Badge ok={health?.protegrity?.classify} label="Protegrity" />
          <Badge ok={repoOk} label="GitHub" />
          <Badge ok={slackOk} label="Slack" />
        </div>
      </div>
    </header>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
